<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MeoMoney</title>
<link rel="icon" href="icons/favicon-32.png" />
<style>
  :root {
    --bg: #f3faf5;
    --primary: #f15a29;
    --primary-dark: #c8451d;
    --text: #14261c;
    --text-muted: #6b7c73;
    --surface: #ffffff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    touch-action: manipulation;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 18px;
  }
  .icon {
    width: 104px;
    height: 104px;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(241, 90, 41, 0.25);
  }
  h1 {
    margin: 0;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 10px 24px rgba(241, 90, 41, 0.3);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 8px;
  }
  .btn-link {
    background: var(--surface);
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  .actions {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 6px;
  }
  .hint {
    font-size: 0.82rem;
    color: var(--text-muted);
    min-height: 1.2em;
  }

  .stats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--text-muted);
    min-height: 1.2em;
  }
  .stats strong { color: var(--text); }

  .rating {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-top: 4px;
  }
  .rating-label {
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .stars {
    display: flex;
    gap: 4px;
  }
  .star {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    font-size: 1.9rem;
    line-height: 1;
    color: #d8dfda;
    transition: transform 0.15s ease, color 0.15s ease;
  }
  .star:active { transform: scale(0.9); }
  .star.filled { color: #f5b301; }

  .comments {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 8px;
    border-top: 1px solid #e4ece6;
    text-align: left;
  }
  .comments h2 {
    margin: 0;
    font-size: 0.95rem;
    font-weight: 800;
  }
  .comment-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .comment-input,
  .comment-textarea {
    width: 100%;
    border: 1.5px solid #dbe6df;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
  }
  .comment-input:focus,
  .comment-textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  .comment-textarea {
    resize: vertical;
    min-height: 60px;
  }
  .comment-submit {
    align-self: flex-end;
    padding: 10px 18px;
    width: auto;
    font-size: 0.9rem;
  }
  .comment-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .comment-item {
    background: var(--surface);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .comment-name {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
  }
  .comment-text {
    font-size: 0.88rem;
    color: var(--text);
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .comment-empty {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 38, 28, 0.55);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: max(56px, calc(28px + env(safe-area-inset-top))) 20px 20px;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 10;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border-radius: 22px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateY(12px);
    transition: transform 0.2s ease;
  }
  .overlay.open .sheet { transform: translateY(0); }
  .video-frame {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #0b0f0d;
    border-radius: 16px;
    overflow: hidden;
  }
  .video-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .video-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffffaa;
    font-size: 0.85rem;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<div class="card">
  <img class="icon" src="icons/icon-512.png" alt="MeoMoney" />
  <h1>MeoMoney</h1>

  <div id="stats" class="stats" style="display:none;"></div>

  <div class="actions">
    <button id="installBtn" class="btn btn-primary">Cài đặt</button>
    <a id="openBtn" class="btn btn-link" href="https://meomoney.vercel.app/" style="text-decoration:none; display:none;">Mở ứng dụng</a>
  </div>
  <div id="hint" class="hint"></div>

  <div class="rating">
    <div id="ratingLabel" class="rating-label">Bạn thấy MeoMoney thế nào?</div>
    <div id="stars" class="stars">
      <button class="star" data-value="1">★</button>
      <button class="star" data-value="2">★</button>
      <button class="star" data-value="3">★</button>
      <button class="star" data-value="4">★</button>
      <button class="star" data-value="5">★</button>
    </div>
  </div>

  <div class="comments">
    <h2>Bình luận</h2>
    <div class="comment-form">
      <input id="commentName" class="comment-input" type="text" maxlength="40" placeholder="Tên của bạn (không bắt buộc)" />
      <textarea id="commentText" class="comment-textarea" maxlength="300" placeholder="Viết bình luận về MeoMoney..."></textarea>
      <button id="commentSubmit" class="btn btn-primary comment-submit">Gửi</button>
    </div>
    <div id="commentList" class="comment-list">
      <div class="comment-empty">Chưa có bình luận nào.</div>
    </div>
  </div>
</div>

<div id="videoOverlay" class="overlay">
  <div class="sheet">
    <div class="video-frame">
      <video id="tutorialVideo" playsinline controls style="display:none;"></video>
      <div id="videoPlaceholder" class="video-placeholder">Video hướng dẫn sẽ sớm cập nhật</div>
    </div>
    <a class="btn btn-link" href="https://meomoney.vercel.app/" style="text-decoration:none;">Truy cập ứng dụng</a>
    <button id="closeOverlay" class="btn btn-ghost">Đóng</button>
  </div>
</div>

<script>
  const APP_URL = "https://meomoney.vercel.app/";
  const IOS_TUTORIAL_VIDEO = "videos/ios-install.mp4";
  const STORE_STATS_URL = "https://script.google.com/macros/s/AKfycbzGlQVuYVsHQZKaO_GQO5VMHYuMkmWqihlK2YItpGgTybbPs1zaGh6Bi5Y0TNkeDAfR/exec";

  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) || (ua.includes("Macintosh") && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/.test(ua);

  const installBtn = document.getElementById("installBtn");
  const openBtn = document.getElementById("openBtn");
  const hint = document.getElementById("hint");
  const statsEl = document.getElementById("stats");
  const ratingLabel = document.getElementById("ratingLabel");
  const starButtons = Array.from(document.querySelectorAll(".star"));
  const commentNameEl = document.getElementById("commentName");
  const commentTextEl = document.getElementById("commentText");
  const commentSubmitEl = document.getElementById("commentSubmit");
  const commentListEl = document.getElementById("commentList");
  const videoOverlay = document.getElementById("videoOverlay");
  const closeOverlay = document.getElementById("closeOverlay");
  const tutorialVideo = document.getElementById("tutorialVideo");
  const videoPlaceholder = document.getElementById("videoPlaceholder");

  const DEVICE_ID_KEY = "sotuchi.deviceId";
  function getDeviceId() {
    let id = localStorage.getItem(DEVICE_ID_KEY);
    if (!id) {
      id = Math.random().toString(36).slice(2, 8).toUpperCase();
      localStorage.setItem(DEVICE_ID_KEY, id);
    }
    return id;
  }

  function renderStats(data) {
    if (!data) return;
    const parts = [];
    if (data.ratingCount > 0) parts.push(`⭐ <strong>${data.avgRating}</strong> (${data.ratingCount} đánh giá)`);
    if (data.downloads > 0) parts.push(`<strong>${data.downloads}</strong> lượt tải`);
    if (parts.length) {
      statsEl.innerHTML = parts.join(" · ");
      statsEl.style.display = "flex";
    }
    if (data.comments) renderComments(data.comments);
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderComments(comments) {
    if (!comments.length) {
      commentListEl.innerHTML = '<div class="comment-empty">Chưa có bình luận nào.</div>';
      return;
    }
    commentListEl.innerHTML = comments
      .map((c) => {
        const ten = escapeHtml(c.ten || "Người dùng ẩn danh");
        const noiDung = escapeHtml(c.noiDung || "");
        return `<div class="comment-item"><div class="comment-name">${ten}</div><div class="comment-text">${noiDung}</div></div>`;
      })
      .join("");
  }

  function highlightStars(value) {
    starButtons.forEach((btn) => {
      btn.classList.toggle("filled", Number(btn.dataset.value) <= value);
    });
  }

  const MY_RATING_KEY = "sotuchi.myRating";
  const myRating = Number(localStorage.getItem(MY_RATING_KEY) || 0);
  if (myRating > 0) {
    highlightStars(myRating);
    ratingLabel.textContent = "Cảm ơn bạn đã đánh giá!";
  }

  function callStoreStats(params) {
    if (!STORE_STATS_URL) return Promise.resolve(null);
    const query = new URLSearchParams(params).toString();
    return fetch(`${STORE_STATS_URL}?${query}`)
      .then((res) => res.json())
      .catch(() => null);
  }

  callStoreStats({}).then(renderStats);

  starButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
      const value = Number(btn.dataset.value);
      highlightStars(value);
      localStorage.setItem(MY_RATING_KEY, String(value));
      ratingLabel.textContent = "Cảm ơn bạn đã đánh giá!";
      callStoreStats({ action: "rate", deviceId: getDeviceId(), stars: value }).then(renderStats);
    });
  });

  function logDownload() {
    callStoreStats({ action: "download", deviceId: getDeviceId() }).then(renderStats);
  }

  commentSubmitEl.addEventListener("click", () => {
    const text = commentTextEl.value.trim();
    if (!text) return;
    const name = commentNameEl.value.trim();
    commentSubmitEl.disabled = true;
    callStoreStats({ action: "comment", deviceId: getDeviceId(), name, text })
      .then((data) => {
        renderStats(data);
        commentTextEl.value = "";
      })
      .finally(() => {
        commentSubmitEl.disabled = false;
      });
  });

  let deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  if (IOS_TUTORIAL_VIDEO) {
    tutorialVideo.src = IOS_TUTORIAL_VIDEO;
    tutorialVideo.style.display = "block";
    videoPlaceholder.style.display = "none";
  }

  if (isIOS) {
    installBtn.addEventListener("click", () => {
      videoOverlay.classList.add("open");
      if (IOS_TUTORIAL_VIDEO) tutorialVideo.play().catch(() => {});
    });
    document.querySelector('.sheet a[href="https://meomoney.vercel.app/"]').addEventListener("click", () => {
      logDownload();
    });
  } else if (isAndroid) {
    installBtn.addEventListener("click", async () => {
      logDownload();
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      } else {
        window.location.href = APP_URL;
      }
    });
  } else {
    installBtn.textContent = "Mở ứng dụng";
    installBtn.addEventListener("click", () => {
      logDownload();
      window.location.href = APP_URL;
    });
  }

  closeOverlay.addEventListener("click", () => {
    videoOverlay.classList.remove("open");
    tutorialVideo.pause();
  });
</script>
</body>
</html>
